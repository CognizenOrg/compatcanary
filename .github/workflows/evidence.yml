name: Evidence

on:
  push:
    branches: [main]
    paths:
      - "COMPATIBILITY.md"
      - "evidence/**"
      - "scripts/build-evidence.js"
      - "src/evidence.js"
      - "test/evidence.test.js"
  pull_request:
    paths:
      - "COMPATIBILITY.md"
      - "evidence/**"
      - "scripts/build-evidence.js"
      - "src/evidence.js"
      - "test/evidence.test.js"
  workflow_dispatch:

permissions:
  contents: read

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm test
      - run: npm run evidence:check
