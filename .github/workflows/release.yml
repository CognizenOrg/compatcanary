name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest
    environment: npm
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          registry-url: https://registry.npmjs.org
      - run: npm install --global npm@11
      - run: npm ci
      - run: npm run check
      - run: npm test
      - run: npm run evidence:check
      - name: Verify tag matches package version
        run: |
          package_version=$(node -p "require('./package.json').version")
          test "v$package_version" = "$GITHUB_REF_NAME"
      - name: Check registry state
        id: registry
        run: |
          package_version=$(node -p "require('./package.json').version")
          if npm view "compatcanary@$package_version" version >/dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
          fi
      - name: Publish to npm
        if: steps.registry.outputs.published != 'true'
        run: npm publish --provenance --access public
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release view "$GITHUB_REF_NAME" >/dev/null 2>&1 || gh release create "$GITHUB_REF_NAME" --generate-notes --title "CompatCanary $GITHUB_REF_NAME"
